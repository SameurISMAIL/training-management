<div class="page-container">
	<div class="page-header">
		<h1>Participants</h1>
		<button mat-raised-button color="primary" class="action-btn" [routerLink]="['/participants/new']">
			<mat-icon>add</mat-icon>
			Nouveau Participant
		</button>
	</div>

	<mat-card class="list-card">
		<div class="filters-row">
			<mat-form-field appearance="outline" class="search-field">
				<mat-label>Rechercher</mat-label>
				<mat-icon matPrefix>search</mat-icon>
				<input matInput placeholder="Nom, prénom..." (input)="applyFilter($event)" />
			</mat-form-field>
		</div>

		<div class="loading-container" *ngIf="loading">
			<mat-spinner diameter="48"></mat-spinner>
		</div>

		<div class="table-wrapper" *ngIf="!loading">
			<table mat-table [dataSource]="dataSource" matSort>
				<ng-container matColumnDef="nom">
					<th mat-header-cell *matHeaderCellDef mat-sort-header>Nom</th>
					<td mat-cell *matCellDef="let participant">{{ participant.nom }}</td>
				</ng-container>

				<ng-container matColumnDef="prenom">
					<th mat-header-cell *matHeaderCellDef mat-sort-header>Prénom</th>
					<td mat-cell *matCellDef="let participant">{{ participant.prenom }}</td>
				</ng-container>

				<ng-container matColumnDef="email">
					<th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
					<td mat-cell *matCellDef="let participant">{{ participant.email }}</td>
				</ng-container>

				<ng-container matColumnDef="tel">
					<th mat-header-cell *matHeaderCellDef mat-sort-header>Tél</th>
					<td mat-cell *matCellDef="let participant">{{ participant.tel }}</td>
				</ng-container>

				<ng-container matColumnDef="structure">
					<th mat-header-cell *matHeaderCellDef mat-sort-header>Structure</th>
					<td mat-cell *matCellDef="let participant">{{ participant.structure?.libelle }}</td>
				</ng-container>

				<ng-container matColumnDef="profil">
					<th mat-header-cell *matHeaderCellDef mat-sort-header>Profil</th>
					<td mat-cell *matCellDef="let participant">{{ participant.profil?.libelle }}</td>
				</ng-container>

				<ng-container matColumnDef="actions">
					<th mat-header-cell *matHeaderCellDef>Actions</th>
					<td mat-cell *matCellDef="let participant" class="actions-cell">
						<button mat-icon-button color="primary" type="button" [routerLink]="['/participants', participant.id, 'edit']" matTooltip="Modifier" aria-label="Modifier">
							<mat-icon>edit</mat-icon>
						</button>
						<button mat-icon-button color="warn" type="button" (click)="openDeleteDialog(participant)" matTooltip="Supprimer" aria-label="Supprimer">
							<mat-icon>delete</mat-icon>
						</button>
					</td>
				</ng-container>

				<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
				<tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
			</table>

			<mat-paginator [pageSize]="5" [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
		</div>
	</mat-card>
</div>
