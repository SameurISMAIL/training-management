<div class="page-wrapper">
	<div class="page-header">
		<div class="page-title">
			<mat-icon>person_outline</mat-icon>
			Formateurs
			<span class="count-badge">{{ dataSource.data.length || 0 }}</span>
		</div>
		<button mat-raised-button color="primary" class="primary-btn" (click)="openCreateDialog()">
			<mat-icon>add</mat-icon>
			Nouveau Formateur
		</button>
	</div>

	<mat-card>
		<mat-card-content>
			<mat-form-field appearance="outline" class="search-field">
				<mat-label>Rechercher</mat-label>
				<mat-icon matPrefix>search</mat-icon>
				<input matInput (keyup)="applyFilter($event)">
			</mat-form-field>

			<div class="loading-container" *ngIf="loading">
				<mat-spinner diameter="48"></mat-spinner>
			</div>

			<table mat-table [dataSource]="dataSource" matSort *ngIf="!loading" class="full-table">
				<ng-container matColumnDef="nom">
					<th mat-header-cell *matHeaderCellDef mat-sort-header>Nom</th>
					<td mat-cell *matCellDef="let f">{{ f.nom }}</td>
				</ng-container>
				<ng-container matColumnDef="prenom">
					<th mat-header-cell *matHeaderCellDef mat-sort-header>Prénom</th>
					<td mat-cell *matCellDef="let f">{{ f.prenom }}</td>
				</ng-container>
				<ng-container matColumnDef="email">
					<th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
					<td mat-cell *matCellDef="let f">{{ f.email }}</td>
				</ng-container>
				<ng-container matColumnDef="tel">
					<th mat-header-cell *matHeaderCellDef mat-sort-header>Tél</th>
					<td mat-cell *matCellDef="let f">{{ f.tel }}</td>
				</ng-container>
				<ng-container matColumnDef="type">
					<th mat-header-cell *matHeaderCellDef mat-sort-header>Type</th>
					<td mat-cell *matCellDef="let f">
						<span [class.badge-interne]="f.type?.toLowerCase() === 'interne'" [class.badge-externe]="f.type?.toLowerCase() !== 'interne'">
							{{ f.type }}
						</span>
					</td>
				</ng-container>
				<ng-container matColumnDef="actions">
					<th mat-header-cell *matHeaderCellDef>Actions</th>
					<td mat-cell *matCellDef="let f">
						<button mat-icon-button color="primary" (click)="openEditDialog(f)" matTooltip="Modifier">
							<mat-icon>edit</mat-icon>
						</button>
						<button mat-icon-button color="warn" (click)="openDeleteDialog(f)" matTooltip="Supprimer">
							<mat-icon>delete</mat-icon>
						</button>
					</td>
				</ng-container>

				<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
				<tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
			</table>
			<mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>
		</mat-card-content>
	</mat-card>
</div>
