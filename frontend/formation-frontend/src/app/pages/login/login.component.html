<div class="login-wrapper">
	<mat-card class="login-form">
		<div class="logo-wrap">
			<mat-icon>school</mat-icon>
			<h1>Connexion</h1>
			<p>Excellent Training</p>
		</div>

		<form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-fields">

			<mat-form-field appearance="outline" class="full-width">
				<mat-label>Login</mat-label>
				<input matInput formControlName="login" />
				<mat-error *ngIf="loginControl.hasError('required') && (loginControl.touched || loginControl.dirty)">
					Le login est obligatoire.
				</mat-error>
			</mat-form-field>

			<mat-form-field appearance="outline" class="full-width">
				<mat-label>Mot de passe</mat-label>
				<input matInput type="password" formControlName="password" />
				<mat-error *ngIf="passwordControl.hasError('required') && (passwordControl.touched || passwordControl.dirty)">
					Le mot de passe est obligatoire.
				</mat-error>
				<mat-error *ngIf="passwordControl.hasError('minlength') && (passwordControl.touched || passwordControl.dirty)">
					Le mot de passe doit contenir au moins 4 caracteres.
				</mat-error>
			</mat-form-field>

			<button mat-raised-button color="primary" type="submit" [disabled]="isSubmitting" class="login-btn">
				{{ isSubmitting ? 'Connexion...' : 'Se connecter' }}
			</button>
		</form>
	</mat-card>
</div>
