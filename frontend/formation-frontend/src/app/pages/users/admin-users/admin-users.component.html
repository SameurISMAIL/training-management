<div class="page-wrapper users-page">
  <mat-card class="users-card">
    <mat-card-content>

      <div class="users-header">
        <div class="page-title">
          <mat-icon>manage_accounts</mat-icon>
          Utilisateurs
          <span class="count-badge">{{ dataSource.data.length || 0 }}</span>
        </div>
        <button mat-raised-button color="primary" class="primary-btn" (click)="openCreateDialog()">
          <mat-icon>person_add</mat-icon>
          Nouvel utilisateur
        </button>
      </div>

      <div class="users-toolbar">
        <mat-form-field appearance="outline" class="search-field">
          <mat-label>Rechercher</mat-label>
          <mat-icon matPrefix>search</mat-icon>
          <input matInput (keyup)="applyFilter($event)" placeholder="Login ou role">
        </mat-form-field>
      </div>

      <p class="users-help">Vous ne pouvez pas supprimer votre propre compte.</p>

      <div class="loading-container" *ngIf="loading">
        <mat-spinner diameter="48"></mat-spinner>
      </div>

      <div *ngIf="!loading">
        <div class="table-shell" *ngIf="dataSource.filteredData.length > 0; else emptyState">
          <table mat-table [dataSource]="dataSource" matSort class="full-table">

            <ng-container matColumnDef="login">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Login</th>
              <td mat-cell *matCellDef="let user">{{ user.login }}</td>
            </ng-container>

            <ng-container matColumnDef="role">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Role</th>
              <td mat-cell *matCellDef="let user">
                <span class="role-chip" [ngClass]="getRoleClass(user.role)">{{ getRoleLabel(user.role) }}</span>
              </td>
            </ng-container>

            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef>Actions</th>
              <td mat-cell *matCellDef="let user" class="actions-cell">
                <button
                  mat-icon-button
                  color="warn"
                  [disabled]="!canDelete(user)"
                  (click)="openDeleteDialog(user)"
                  [matTooltip]="canDelete(user) ? 'Supprimer' : 'Vous ne pouvez pas supprimer votre propre compte'">
                  <mat-icon>delete</mat-icon>
                </button>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
          </table>
        </div>

        <ng-template #emptyState>
          <div class="empty-state">
            <mat-icon>group_off</mat-icon>
            <h3>Aucun utilisateur trouve</h3>
            <p>Modifiez le filtre ou ajoutez un nouvel utilisateur.</p>
          </div>
        </ng-template>
      </div>

      <mat-paginator [pageSizeOptions]="[5,10,25]" showFirstLastButtons></mat-paginator>

    </mat-card-content>
  </mat-card>
</div>
