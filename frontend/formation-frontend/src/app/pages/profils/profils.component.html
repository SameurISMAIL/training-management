<div class="page-container profils-page">
  <div class="page-header">
    <h1>Profils</h1>
    <button mat-raised-button color="primary" class="action-btn" (click)="focusCreateForm()">
      <mat-icon>add</mat-icon>
      Ajouter
    </button>
  </div>

  <div class="admin-layout">
    <mat-card class="table-card list-card">
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Rechercher</mat-label>
        <mat-icon matPrefix>search</mat-icon>
        <input matInput placeholder="ID, libellé..." (input)="applyFilter($event)" />
      </mat-form-field>

      <p class="record-count">{{ dataSource.data.length }} enregistrements trouvés</p>

      <div class="loading-container" *ngIf="loading">
        <mat-spinner diameter="48"></mat-spinner>
      </div>

      <div class="table-wrapper" *ngIf="!loading">
        <table mat-table [dataSource]="dataSource" matSort>
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
        <td mat-cell *matCellDef="let profil">{{ profil.id }}</td>
      </ng-container>

      <ng-container matColumnDef="libelle">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Libellé</th>
        <td mat-cell *matCellDef="let profil">
          <ng-container *ngIf="editingId === profil.id; else displayLabel">
            <mat-form-field appearance="outline" class="inline-edit-field">
              <input matInput [(ngModel)]="editingLibelle" />
            </mat-form-field>
          </ng-container>
          <ng-template #displayLabel>
            {{ profil.libelle }}
          </ng-template>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let profil" class="actions-cell">
          <ng-container *ngIf="editingId === profil.id; else viewActions">
            <button mat-icon-button color="primary" type="button" (click)="saveEdit(profil)" aria-label="Enregistrer">
              <mat-icon>save</mat-icon>
            </button>
            <button mat-icon-button type="button" (click)="cancelEdit()" aria-label="Annuler">
              <mat-icon>close</mat-icon>
            </button>
          </ng-container>
          <ng-template #viewActions>
            <button mat-icon-button color="primary" type="button" (click)="startEdit(profil)" aria-label="Modifier">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" type="button" (click)="openDeleteDialog(profil)" aria-label="Supprimer">
              <mat-icon>delete</mat-icon>
            </button>
          </ng-template>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns" [class.editing-row]="editingId === row.id"></tr>
        </table>

        <mat-paginator [pageSize]="5" [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
      </div>
    </mat-card>

    <mat-card class="create-card">
      <h2>Créer un nouveau profil</h2>
      <form class="create-form" [formGroup]="createForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline">
          <mat-label>Libellé</mat-label>
          <input #createInput matInput formControlName="libelle" />
          <mat-error *ngIf="libelleControl.hasError('required') && (libelleControl.touched || libelleControl.dirty)">
            Le libellé est obligatoire.
          </mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" class="action-btn">
          <mat-icon>save</mat-icon>
          Enregistrer
        </button>
      </form>
    </mat-card>
  </div>
</div>
