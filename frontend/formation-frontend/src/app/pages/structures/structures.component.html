<div class="page-wrapper">
  <div class="page-header">
    <div class="page-title">
      <mat-icon>account_tree</mat-icon>
      Structures
      <span class="count-badge">{{ dataSource.data.length || 0 }}</span>
    </div>
  </div>

  <div class="admin-layout">
    <mat-card class="table-card">
      <mat-card-content>
        <mat-form-field appearance="outline" class="search-field">
          <mat-label>Rechercher...</mat-label>
          <mat-icon matPrefix>search</mat-icon>
          <input matInput (keyup)="applyFilter($event)">
        </mat-form-field>
        <table mat-table [dataSource]="dataSource" matSort>
          <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
            <td mat-cell *matCellDef="let s">{{ s.id }}</td>
          </ng-container>
          <ng-container matColumnDef="libelle">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Libellé</th>
            <td mat-cell *matCellDef="let s">{{ s.libelle }}</td>
          </ng-container>
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let s">
              <button mat-icon-button color="primary" (click)="startEdit(s)" matTooltip="Modifier">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="openDeleteDialog(s)" matTooltip="Supprimer">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
        <mat-paginator [pageSizeOptions]="[5,10]"></mat-paginator>
      </mat-card-content>
    </mat-card>

    <mat-card class="form-card">
      <mat-card-header>
        <mat-card-title>
          <mat-icon>{{ editingId ? 'edit' : 'add_circle' }}</mat-icon>
          {{ editingId ? 'Modifier' : 'Ajouter' }}
        </mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <mat-form-field appearance="outline" style="width:100%">
          <mat-label>Libellé</mat-label>
          <input matInput [(ngModel)]="currentLibelle" placeholder="Saisir le libellé">
          <mat-error *ngIf="!currentLibelle">Libellé requis</mat-error>
        </mat-form-field>
      </mat-card-content>
      <mat-card-actions align="end">
        <button mat-stroked-button *ngIf="editingId" (click)="cancelEdit()">
          <mat-icon>cancel</mat-icon> Annuler
        </button>
        <button mat-raised-button color="primary" (click)="save()" [disabled]="!currentLibelle">
          <mat-icon>{{ editingId ? 'save' : 'add' }}</mat-icon>
          {{ editingId ? 'Enregistrer' : 'Ajouter' }}
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
