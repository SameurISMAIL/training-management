<div class="page-wrapper users-page">
  <mat-card class="users-card">
    <mat-card-content>
      <div class="users-header">
        <div class="page-title">
          <mat-icon>account_tree</mat-icon>
          Structures
          <span class="count-badge">{{ dataSource.data.length || 0 }}</span>
        </div>
      </div>

      <p class="readonly-note">La liste des structures est fixe: Direction centrale et Direction régionale.</p>

      <div class="users-toolbar">
        <mat-form-field appearance="outline" class="search-field">
          <mat-label>Rechercher</mat-label>
          <mat-icon matPrefix>search</mat-icon>
          <input matInput (keyup)="applyFilter($event)" placeholder="Libellé de la structure">
        </mat-form-field>
      </div>

      <div class="loading-container" *ngIf="loading">
        <mat-spinner diameter="48"></mat-spinner>
      </div>

      <div *ngIf="!loading">
        <div class="table-shell" *ngIf="dataSource.filteredData.length > 0; else emptyState">
          <table mat-table [dataSource]="dataSource" matSort class="full-table">
            <ng-container matColumnDef="libelle">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Libellé</th>
              <td mat-cell *matCellDef="let s">{{ s.libelle }}</td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
          </table>
        </div>

        <ng-template #emptyState>
          <div class="empty-state">
            <mat-icon>search_off</mat-icon>
            <h3>Aucune structure trouvee</h3>
            <p>Modifiez le filtre.</p>
          </div>
        </ng-template>
      </div>

      <mat-paginator [pageSizeOptions]="[5,10,25]" showFirstLastButtons></mat-paginator>
    </mat-card-content>
  </mat-card>
</div>
