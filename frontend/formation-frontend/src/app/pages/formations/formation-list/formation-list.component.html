<div class="page-wrapper">
	<div class="page-header">
		<div class="page-title">
			<mat-icon>school</mat-icon>
			Formations
			<span class="count-badge">{{ dataSource.data.length || 0 }}</span>
		</div>
		<button mat-raised-button color="primary" class="primary-btn" (click)="openCreateDialog()">
			<mat-icon>add</mat-icon>
			Nouvelle Formation
		</button>
	</div>

	<mat-card>
		<mat-card-content>
			<div class="table-toolbar">
				<mat-form-field appearance="outline" class="search-field">
					<mat-label>Rechercher une formation...</mat-label>
					<mat-icon matPrefix>search</mat-icon>
					<input matInput (keyup)="applyFilter($event)" #filterInput>
				</mat-form-field>
			</div>

			<div *ngIf="loading" class="loading-container">
				<mat-spinner diameter="48"></mat-spinner>
			</div>

			<div *ngIf="!loading">
				<table mat-table [dataSource]="dataSource" matSort class="formations-table">
					<ng-container matColumnDef="titre">
						<th mat-header-cell *matHeaderCellDef mat-sort-header>Titre</th>
						<td mat-cell *matCellDef="let f">
							<div class="formation-title">
								<mat-icon class="table-icon">school</mat-icon>
								<span>{{ f.titre }}</span>
							</div>
						</td>
					</ng-container>
					<ng-container matColumnDef="annee">
						<th mat-header-cell *matHeaderCellDef mat-sort-header>Année</th>
						<td mat-cell *matCellDef="let f">
							<span class="year-badge">{{ f.annee }}</span>
						</td>
					</ng-container>
					<ng-container matColumnDef="duree">
						<th mat-header-cell *matHeaderCellDef mat-sort-header>Durée</th>
						<td mat-cell *matCellDef="let f">{{ f.duree }} j</td>
					</ng-container>
					<ng-container matColumnDef="domaine">
						<th mat-header-cell *matHeaderCellDef>Domaine</th>
						<td mat-cell *matCellDef="let f">
							<span class="domaine-chip">{{ f.domaine?.libelle }}</span>
						</td>
					</ng-container>
					<ng-container matColumnDef="budget">
						<th mat-header-cell *matHeaderCellDef mat-sort-header>Budget</th>
						<td mat-cell *matCellDef="let f">
							<strong>{{ f.budget | number:'1.0-0' }} TND</strong>
						</td>
					</ng-container>
					<ng-container matColumnDef="actions">
						<th mat-header-cell *matHeaderCellDef>Actions</th>
						<td mat-cell *matCellDef="let f">
							<button mat-icon-button color="primary" (click)="openEditDialog(f)" matTooltip="Modifier">
								<mat-icon>edit</mat-icon>
							</button>
							<button mat-icon-button color="warn" (click)="deleteFormation(f.id)" matTooltip="Supprimer">
								<mat-icon>delete</mat-icon>
							</button>
						</td>
					</ng-container>
					<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
					<tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></tr>
					<tr class="mat-row" *matNoDataRow>
						<td class="mat-cell empty-row" [attr.colspan]="displayedColumns.length">
							<div class="empty-state">
								<mat-icon>search_off</mat-icon>
								<span>Aucune formation trouvée</span>
							</div>
						</td>
					</tr>
				</table>
				<mat-paginator [pageSizeOptions]="[5,10,25]" showFirstLastButtons></mat-paginator>
			</div>
		</mat-card-content>
	</mat-card>
</div>
