<mat-sidenav-container>
  <mat-sidenav
    [mode]="isMobileView ? 'over' : 'side'"
    [(opened)]="isSidenavOpened"
    [disableClose]="!isMobileView"
    class="app-sidenav"
  >
    <app-sidebar (navigate)="onSidebarNavigate()"></app-sidebar>
  </mat-sidenav>
  <mat-sidenav-content>
    <app-navbar (toggleSidenav)="onToggleSidenav()"></app-navbar>
    <div class="main-content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
