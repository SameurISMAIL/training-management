<header class="navbar">
  <div class="navbar-left">
    <button mat-icon-button type="button" (click)="onToggleSidenav()" aria-label="Menu">
      <mat-icon>menu</mat-icon>
    </button>
    <div class="brand">
      <mat-icon class="brand-icon">school</mat-icon>
      <span class="app-title">Excellent Training</span>
    </div>
  </div>

  <div class="navbar-right" *ngIf="authService.isLoggedIn()">
    <button
      mat-icon-button
      type="button"
      class="theme-toggle"
      (click)="toggleDarkMode()"
      [attr.aria-label]="isDarkMode ? 'Activer le mode clair' : 'Activer le mode sombre'"
      [matTooltip]="isDarkMode ? 'Mode clair' : 'Mode sombre'"
    >
      <mat-icon>{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>
    <div class="user-avatar">{{ userInitial }}</div>
    <span class="user-login">{{ authService.getLogin() }}</span>
    <button mat-button type="button" class="logout-btn" (click)="logout()">
      <mat-icon>logout</mat-icon>
      Déconnexion
    </button>
  </div>
</header>
